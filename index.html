<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport"
  content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>四角形を対角線で切ってみよう</title>
<style>
:root {
  --bg: #f6f8fb;
  --panel: #ffffff;
  --ink: #243044;
  --muted: #667085;
  --line: #d0d5dd;
  --accent: #2563eb;
  --accent-weak: #dbeafe;
  --danger: #dc2626;
  --shadow: 0 8px 24px rgba(16, 24, 40, .12);
}
* {
  box-sizing: border-box;
}
html,
body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  color: var(--ink);
  background: var(--bg);
  font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
}
.app {
  display: grid;
  grid-template-columns: 270px 1fr;
  height: 100%;
}
.sidebar {
  z-index: 2;
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding: 16px;
  background: var(--panel);
  border-right: 1px solid var(--line);
  box-shadow: var(--shadow);
}
h1 {
  margin: 0;
  font-size: 20px;
  line-height: 1.35;
}
.help {
  margin: 0;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.55;
}
.section-title {
  margin: 4px 0 -6px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
}
.palette {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
button {
  min-height: 38px;
  padding: 9px 10px;
  border: 1px solid var(--line);
  border-radius: 10px;
  color: var(--ink);
  background: #fff;
  font-weight: 700;
  cursor: pointer;
}
button:hover {
  border-color: var(--accent);
  background: var(--accent-weak);
}
button.primary {
  color: white;
  border-color: var(--accent);
  background: var(--accent);
}
button.danger {
  color: white;
  border-color: var(--danger);
  background: var(--danger);
}
button:disabled {
  cursor: not-allowed;
  opacity: .5;
}
.toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
}
.toggle input {
  width: 18px;
  height: 18px;
}
.status {
  min-height: 70px;
  padding: 10px;
  border-radius: 12px;
  color: #1e3a8a;
  background: #eff6ff;
  border: 1px solid #bfdbfe;
  font-size: 13px;
  line-height: 1.5;
}
.canvas-wrap {
  position: relative;
  height: 100%;
}
canvas {
  display: block;
  width: 100%;
  height: 100%;
  touch-action: none;
  background:
    linear-gradient(#e8eef8 1px, transparent 1px),
    linear-gradient(90deg, #e8eef8 1px, transparent 1px),
    #fbfdff;
  background-size: 28px 28px;
}
.menu {
  position: fixed;
  z-index: 10;
  display: none;
  min-width: 150px;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: white;
  box-shadow: var(--shadow);
}
.menu button {
  display: block;
  width: 100%;
  border: 0;
  border-radius: 0;
  text-align: left;
  font-weight: 600;
}
.badge {
  position: absolute;
  right: 14px;
  bottom: 12px;
  padding: 7px 10px;
  color: var(--muted);
  background: rgba(255, 255, 255, .86);
  border: 1px solid var(--line);
  border-radius: 999px;
  font-size: 12px;
}
@media (max-width: 760px) {
  .app {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr;
  }
  .sidebar {
    max-height: 46vh;
    overflow: auto;
    border-right: 0;
    border-bottom: 1px solid var(--line);
  }
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <h1>四角形を<br>対角線で切ってみよう</h1>
    <p class="help">
      図形を選び、隣り合わない頂点を2つ選んでから
      「対角線で切る」を押します。できた図形は動かして、
      重ねたり裏返したりできます。
    </p>

    <div class="section-title">図形パレット</div>
    <div class="palette" id="palette"></div>

    <button class="primary" id="cutBtn" disabled>
      対角線で切る
    </button>

    <button id="clearSelBtn">
      頂点選択を解除
    </button>

    <button id="centerBtn">
      選択図形を中央へ
    </button>

    <button class="danger" id="resetBtn">
      全部消す
    </button>

    <label class="toggle">
      <input type="checkbox" id="labelToggle" checked>
      頂点名と辺の長さを表示
    </label>

    <div class="status" id="status"></div>

    <p class="help">
      右クリック、またはタッチ長押しでメニューを開けます。
      「回転」を選んだ後は、図形の周りをドラッグします。
    </p>
  </aside>

  <main class="canvas-wrap">
    <canvas id="board"></canvas>
    <div class="badge">Google Drive公開用：単一HTML</div>
  </main>
</div>

<div class="menu" id="menu">
  <button data-action="flipX">左右反転</button>
  <button data-action="flipY">上下反転</button>
  <button data-action="rotate">回転モード</button>
  <button data-action="front">前面へ</button>
  <button data-action="delete">削除</button>
</div>

<script>
(() => {
  "use strict";

  const canvas = document.getElementById("board");
  const ctx = canvas.getContext("2d");
  const palette = document.getElementById("palette");
  const cutBtn = document.getElementById("cutBtn");
  const statusEl = document.getElementById("status");
  const menu = document.getElementById("menu");
  const labelToggle = document.getElementById("labelToggle");

  const colors = [
    "#60a5fa", "#f59e0b", "#34d399", "#f472b6",
    "#a78bfa", "#fb7185", "#22d3ee", "#c084fc"
  ];

  const shapes = {
    square: {
      label: "正方形",
      points: [[-70, -70], [70, -70], [70, 70], [-70, 70]]
    },
    rectangle: {
      label: "長方形",
      points: [[-100, -60], [100, -60], [100, 60], [-100, 60]]
    },
    trapezoid: {
      label: "台形",
      points: [[-95, -60], [80, -60], [125, 60], [-125, 60]]
    },
    isoscelesTrapezoid: {
      label: "等脚台形",
      points: [[-75, -65], [75, -65], [125, 65], [-125, 65]]
    },
    parallelogram: {
      label: "平行四辺形",
      points: [[-90, -60], [110, -60], [75, 60], [-125, 60]]
    },
    rhombus: {
      label: "ひし形",
      points: [[0, -90], [120, 0], [0, 90], [-120, 0]]
    }
  };

  let dpr = 1;
  let objects = [];
  let selectedId = null;
  let idSeq = 1;
  let active = null;
  let tool = "move";
  let longPressTimer = null;
  let lastPointer = { x: 0, y: 0 };

  function resize() {
    dpr = Math.max(1, window.devicePixelRatio || 1);
    const r = canvas.getBoundingClientRect();
    canvas.width = Math.round(r.width * dpr);
    canvas.height = Math.round(r.height * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    draw();
  }

  function canvasPoint(ev) {
    const r = canvas.getBoundingClientRect();
    return {
      x: ev.clientX - r.left,
      y: ev.clientY - r.top
    };
  }

  function boardCenter() {
    const r = canvas.getBoundingClientRect();
    return { x: r.width / 2, y: r.height / 2 };
  }

  function addShape(key) {
    const shape = shapes[key];
    const c = boardCenter();
    const obj = {
      id: idSeq++,
      name: shape.label,
      points: shape.points.map(p => ({ x: p[0], y: p[1] })),
      x: c.x,
      y: c.y,
      angle: 0,
      scaleX: 1,
      scaleY: 1,
      color: colors[objects.length % colors.length],
      selectedVerts: []
    };
    objects.push(obj);
    selectedId = obj.id;
    setStatus(`${shape.label}を置きました。頂点を2つ選べます。`);
    draw();
  }

  function getSelected() {
    return objects.find(o => o.id === selectedId) || null;
  }

  function rotatePoint(p, angle) {
    const c = Math.cos(angle);
    const s = Math.sin(angle);
    return {
      x: p.x * c - p.y * s,
      y: p.x * s + p.y * c
    };
  }

  function localToWorld(obj, p) {
    const scaled = {
      x: p.x * obj.scaleX,
      y: p.y * obj.scaleY
    };
    const r = rotatePoint(scaled, obj.angle);
    return { x: r.x + obj.x, y: r.y + obj.y };
  }

  function worldToLocal(obj, p) {
    const q = { x: p.x - obj.x, y: p.y - obj.y };
    const r = rotatePoint(q, -obj.angle);
    return {
      x: r.x / obj.scaleX,
      y: r.y / obj.scaleY
    };
  }

  function transformedPoints(obj) {
    return obj.points.map(p => localToWorld(obj, p));
  }

  function centroid(points) {
    const sum = points.reduce((a, p) => {
      a.x += p.x;
      a.y += p.y;
      return a;
    }, { x: 0, y: 0 });
    return {
      x: sum.x / points.length,
      y: sum.y / points.length
    };
  }

  function distance(a, b) {
    return Math.hypot(a.x - b.x, a.y - b.y);
  }

  function pointInPoly(p, poly) {
    let inside = false;
    for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
      const pi = poly[i];
      const pj = poly[j];
      const hit = ((pi.y > p.y) !== (pj.y > p.y)) &&
        p.x < (pj.x - pi.x) * (p.y - pi.y) / (pj.y - pi.y) + pi.x;
      if (hit) inside = !inside;
    }
    return inside;
  }

  function vertexAt(obj, p) {
    const pts = transformedPoints(obj);
    for (let i = 0; i < pts.length; i++) {
      if (distance(pts[i], p) <= 12) return i;
    }
    return -1;
  }

  function objectAt(p) {
    for (let i = objects.length - 1; i >= 0; i--) {
      const obj = objects[i];
      if (pointInPoly(p, transformedPoints(obj))) return obj;
    }
    return null;
  }

  function isNonAdjacent(obj, a, b) {
    const n = obj.points.length;
    const diff = Math.abs(a - b);
    return diff > 1 && diff < n - 1;
  }

  function canCut(obj) {
    if (!obj || obj.selectedVerts.length !== 2) return false;
    if (obj.points.length < 4) return false;
    const [a, b] = obj.selectedVerts;
    return isNonAdjacent(obj, a, b);
  }

  function updateCutButton() {
    cutBtn.disabled = !canCut(getSelected());
  }

  function setStatus(msg) {
    statusEl.textContent = msg;
    updateCutButton();
  }

  function polygonPath(points) {
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length; i++) {
      ctx.lineTo(points[i].x, points[i].y);
    }
    ctx.closePath();
  }

  function drawGridHint() {
    ctx.save();
    ctx.fillStyle = "#667085";
    ctx.font = "13px system-ui";
    ctx.fillText(
      "図形をドラッグできます。頂点を2つ選んで切断します。",
      18,
      28
    );
    ctx.restore();
  }

  function draw() {
    const r = canvas.getBoundingClientRect();
    ctx.clearRect(0, 0, r.width, r.height);
    drawGridHint();

    for (const obj of objects) {
      const pts = transformedPoints(obj);
      const selected = obj.id === selectedId;

      ctx.save();
      polygonPath(pts);
      ctx.globalAlpha = .78;
      ctx.fillStyle = obj.color;
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.lineWidth = selected ? 4 : 2;
      ctx.strokeStyle = selected ? "#1d4ed8" : "#344054";
      ctx.stroke();

      if (selected && obj.selectedVerts.length === 2) {
        const [a, b] = obj.selectedVerts;
        ctx.beginPath();
        ctx.moveTo(pts[a].x, pts[a].y);
        ctx.lineTo(pts[b].x, pts[b].y);
        ctx.setLineDash([8, 6]);
        ctx.lineWidth = 3;
        ctx.strokeStyle = canCut(obj) ? "#dc2626" : "#98a2b3";
        ctx.stroke();
        ctx.setLineDash([]);
      }

      if (labelToggle.checked) drawLabels(obj, pts);
      drawVertices(obj, pts);
      ctx.restore();
    }

    if (tool === "rotate" && getSelected()) {
      drawRotateHint(getSelected());
    }
  }

  function drawLabels(obj, pts) {
    ctx.font = "bold 14px system-ui";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    for (let i = 0; i < pts.length; i++) {
      const p = pts[i];
      ctx.fillStyle = "#111827";
      ctx.fillText(String.fromCharCode(65 + i), p.x, p.y - 18);
    }

    ctx.font = "12px system-ui";
    ctx.fillStyle = "#475467";
    for (let i = 0; i < pts.length; i++) {
      const a = pts[i];
      const b = pts[(i + 1) % pts.length];
      const m = { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
      const len = Math.round(distance(a, b));
      ctx.fillText(String(len), m.x, m.y);
    }
  }

  function drawVertices(obj, pts) {
    const selected = obj.id === selectedId;
    for (let i = 0; i < pts.length; i++) {
      const chosen = obj.selectedVerts.includes(i);
      ctx.beginPath();
      ctx.arc(pts[i].x, pts[i].y, chosen ? 9 : 6, 0, Math.PI * 2);
      ctx.fillStyle = chosen ? "#dc2626" : "#ffffff";
      ctx.fill();
      ctx.lineWidth = selected ? 2.5 : 1.5;
      ctx.strokeStyle = selected ? "#1d4ed8" : "#344054";
      ctx.stroke();
    }
  }

  function drawRotateHint(obj) {
    const c = { x: obj.x, y: obj.y };
    ctx.save();
    ctx.beginPath();
    ctx.arc(c.x, c.y, 60, 0, Math.PI * 2);
    ctx.setLineDash([5, 6]);
    ctx.strokeStyle = "#2563eb";
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = "#1e3a8a";
    ctx.font = "13px system-ui";
    ctx.fillText("回転モード：図形の周りをドラッグ", c.x + 70, c.y);
    ctx.restore();
  }

  function normalizePiece(worldPoints) {
    const c = centroid(worldPoints);
    return {
      x: c.x,
      y: c.y,
      points: worldPoints.map(p => ({ x: p.x - c.x, y: p.y - c.y }))
    };
  }

  function pathBetween(points, start, end) {
    const out = [];
    let i = start;
    while (true) {
      out.push(points[i]);
      if (i === end) break;
      i = (i + 1) % points.length;
    }
    return out;
  }

  function cutSelected() {
    const obj = getSelected();
    if (!canCut(obj)) {
      setStatus("隣り合わない頂点を2つ選んでください。");
      return;
    }

    const [a, b] = obj.selectedVerts;
    const world = transformedPoints(obj);
    const p1 = pathBetween(world, a, b);
    const p2 = pathBetween(world, b, a);
    const n1 = normalizePiece(p1);
    const n2 = normalizePiece(p2);
    const base = centroid(world);

    function makePiece(norm, index) {
      const away = {
        x: norm.x - base.x,
        y: norm.y - base.y
      };
      const d = Math.hypot(away.x, away.y) || 1;
      return {
        id: idSeq++,
        name: `${obj.name}の一部${index}`,
        points: norm.points,
        x: norm.x + away.x / d * 12,
        y: norm.y + away.y / d * 12,
        angle: 0,
        scaleX: 1,
        scaleY: 1,
        color: colors[(objects.length + index) % colors.length],
        selectedVerts: []
      };
    }

    const idx = objects.findIndex(o => o.id === obj.id);
    objects.splice(idx, 1, makePiece(n1, 1), makePiece(n2, 2));
    selectedId = objects[idx].id;
    tool = "move";
    hideMenu();
    setStatus(
      "切断しました。2つの図形を動かして重ね、合同か確認できます。"
    );
    draw();
  }

  function clearVertexSelection() {
    const obj = getSelected();
    if (!obj) return;
    obj.selectedVerts = [];
    setStatus("頂点の選択を解除しました。");
    draw();
  }

  function selectVertex(obj, index) {
    if (obj.selectedVerts.includes(index)) {
      obj.selectedVerts = obj.selectedVerts.filter(v => v !== index);
    } else {
      if (obj.selectedVerts.length >= 2) obj.selectedVerts.shift();
      obj.selectedVerts.push(index);
    }

    if (obj.selectedVerts.length === 2) {
      const [a, b] = obj.selectedVerts;
      if (obj.points.length < 4) {
        setStatus("三角形はこれ以上、頂点同士では切れません。");
      } else if (isNonAdjacent(obj, a, b)) {
        setStatus("その2点は対角線です。切断できます。");
      } else {
        setStatus("隣り合う頂点です。対角線になる2点を選びます。");
      }
    } else {
      setStatus("もう1つ頂点を選んでください。");
    }
    draw();
  }

  function bringToFront(obj) {
    objects = objects.filter(o => o.id !== obj.id);
    objects.push(obj);
    selectedId = obj.id;
    draw();
  }

  function deleteSelected() {
    objects = objects.filter(o => o.id !== selectedId);
    selectedId = objects.length ? objects[objects.length - 1].id : null;
    tool = "move";
    hideMenu();
    setStatus("選択図形を削除しました。");
    draw();
  }

  function showMenu(x, y) {
    if (!getSelected()) return;
    menu.style.display = "block";
    menu.style.left = `${x}px`;
    menu.style.top = `${y}px`;
  }

  function hideMenu() {
    menu.style.display = "none";
  }

  function startLongPress(ev) {
    clearTimeout(longPressTimer);
    longPressTimer = setTimeout(() => {
      const obj = objectAt(canvasPoint(ev));
      if (obj) {
        selectedId = obj.id;
        showMenu(ev.clientX, ev.clientY);
        draw();
      }
    }, 540);
  }

  function cancelLongPress() {
    clearTimeout(longPressTimer);
    longPressTimer = null;
  }

  canvas.addEventListener("pointerdown", ev => {
    hideMenu();
    canvas.setPointerCapture(ev.pointerId);
    const p = canvasPoint(ev);
    lastPointer = { x: ev.clientX, y: ev.clientY };

    const selected = getSelected();
    if (selected) {
      const vi = vertexAt(selected, p);
      if (vi >= 0 && tool !== "rotate") {
        active = { type: "vertexTap" };
        selectVertex(selected, vi);
        return;
      }
    }

    const obj = objectAt(p);
    if (obj) {
      selectedId = obj.id;
      bringToFront(obj);
      if (tool === "rotate") {
        const angle = Math.atan2(p.y - obj.y, p.x - obj.x);
        active = {
          type: "rotate",
          id: obj.id,
          startPointerAngle: angle,
          startAngle: obj.angle
        };
        setStatus("ドラッグして回転角を変えられます。");
      } else {
        active = {
          type: "move",
          id: obj.id,
          dx: p.x - obj.x,
          dy: p.y - obj.y
        };
        setStatus(`${obj.name}を選択しました。`);
      }
    } else {
      if (tool === "rotate") {
        tool = "move";
        active = null;
        setStatus(
          "回転を確定しました。通常の移動モードに戻りました。"
        );
      } else {
        selectedId = null;
        active = null;
        setStatus("図形を選ぶか、パレットから追加してください。");
      }
    }

    if (ev.pointerType === "touch") startLongPress(ev);
    draw();
  });

  canvas.addEventListener("pointermove", ev => {
    cancelLongPress();
    if (!active) return;
    const p = canvasPoint(ev);
    const obj = objects.find(o => o.id === active.id);
    if (!obj) return;

    if (active.type === "move") {
      obj.x = p.x - active.dx;
      obj.y = p.y - active.dy;
    } else if (active.type === "rotate") {
      const a = Math.atan2(p.y - obj.y, p.x - obj.x);
      obj.angle = active.startAngle + a - active.startPointerAngle;
    }
    draw();
  });

  canvas.addEventListener("pointerup", () => {
    cancelLongPress();
    active = null;
  });

  canvas.addEventListener("pointercancel", () => {
    cancelLongPress();
    active = null;
  });

  canvas.addEventListener("contextmenu", ev => {
    ev.preventDefault();
    const obj = objectAt(canvasPoint(ev));
    if (!obj) return;
    selectedId = obj.id;
    bringToFront(obj);
    showMenu(ev.clientX, ev.clientY);
    draw();
  });

  menu.addEventListener("click", ev => {
    const btn = ev.target.closest("button");
    if (!btn) return;
    const obj = getSelected();
    if (!obj) return;

    const action = btn.dataset.action;
    if (action === "flipX") {
      obj.scaleX *= -1;
      setStatus("左右反転しました。");
    } else if (action === "flipY") {
      obj.scaleY *= -1;
      setStatus("上下反転しました。");
    } else if (action === "rotate") {
      tool = "rotate";
      setStatus("回転モードです。図形の周りをドラッグしてください。");
    } else if (action === "front") {
      bringToFront(obj);
      setStatus("選択図形を前面にしました。");
    } else if (action === "delete") {
      deleteSelected();
      return;
    }
    hideMenu();
    draw();
  });

  document.addEventListener("pointerdown", ev => {
    if (!menu.contains(ev.target) && ev.target !== canvas) hideMenu();
  });

  cutBtn.addEventListener("click", cutSelected);
  document.getElementById("clearSelBtn").addEventListener(
    "click",
    clearVertexSelection
  );
  document.getElementById("resetBtn").addEventListener("click", () => {
    objects = [];
    selectedId = null;
    tool = "move";
    setStatus("すべて消しました。パレットから図形を選んでください。");
    draw();
  });
  document.getElementById("centerBtn").addEventListener("click", () => {
    const obj = getSelected();
    if (!obj) return;
    const c = boardCenter();
    obj.x = c.x;
    obj.y = c.y;
    setStatus("選択図形を中央へ移動しました。");
    draw();
  });
  labelToggle.addEventListener("change", draw);

  for (const key of Object.keys(shapes)) {
    const btn = document.createElement("button");
    btn.textContent = shapes[key].label;
    btn.addEventListener("click", () => addShape(key));
    palette.appendChild(btn);
  }

  window.addEventListener("resize", resize);
  resize();
  setStatus("パレットから図形を選んでください。");
})();
</script>
</body>
</html>
